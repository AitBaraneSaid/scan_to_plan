name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Annule les runs en cours si un nouveau commit arrive sur la même branche
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Job 1 — Lint (ruff) + Type check (mypy)
  # --------------------------------------------------------------------------
  lint:
    name: Lint & Type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-PyYAML
          # Installer les dépendances du projet pour que mypy puisse analyser
          pip install -e "." --no-deps
          pip install numpy scipy pyyaml ezdxf networkx shapely

      - name: Run ruff (lint)
        run: ruff check src/ --output-format=github

      - name: Run ruff (format check)
        run: ruff format src/ --check

      - name: Run mypy
        run: mypy src/scan2plan/ --ignore-missing-imports

  # --------------------------------------------------------------------------
  # Job 2 — Tests sur 3 OS × Python 3.12
  # --------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate test fixtures
        run: python tests/fixtures/generate_fixtures.py

      - name: Run tests with coverage
        run: >-
          python -m pytest tests/
          --cov=scan2plan
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --tb=short
          -v

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Smoke test CLI
        run: scan2plan --help

  # --------------------------------------------------------------------------
  # Job 3 — Build wheel
  # --------------------------------------------------------------------------
  build:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify wheel contents
        run: |
          pip install twine
          twine check dist/*
          python -c "
          import zipfile, sys
          from pathlib import Path
          wheels = list(Path('dist').glob('*.whl'))
          assert wheels, 'Aucun wheel produit'
          with zipfile.ZipFile(wheels[0]) as zf:
              names = zf.namelist()
          assert any('scan2plan' in n for n in names), 'scan2plan absent du wheel'
          assert any('py.typed' in n for n in names), 'py.typed absent du wheel'
          print('Wheel OK:', wheels[0].name)
          print('Fichiers inclus:', len(names))
          "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/

  # --------------------------------------------------------------------------
  # Job 4 — Build documentation (mkdocs) — vérification sur toutes les branches
  # --------------------------------------------------------------------------
  docs:
    name: Build docs
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs-material>=9.5" "mkdocstrings[python]>=0.25"
          pip install -e "." --no-deps
          pip install numpy pyyaml ezdxf networkx shapely scipy

      - name: Build docs (strict)
        run: mkdocs build --strict

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/

  # --------------------------------------------------------------------------
  # Job 5 — Déploiement GitHub Pages (uniquement sur push main)
  # --------------------------------------------------------------------------
  deploy-docs:
    name: Deploy docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: [docs, test]
    # Déployer uniquement sur push vers main (pas sur les PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # Permissions nécessaires pour pousser sur gh-pages
    permissions:
      contents: write

    steps:
      - name: Checkout (avec historique complet pour gh-deploy)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # mkdocs gh-deploy a besoin de l'historique git complet

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs-material>=9.5" "mkdocstrings[python]>=0.25"
          pip install -e "." --no-deps
          pip install numpy pyyaml ezdxf networkx shapely scipy

      - name: Configure git (pour le commit gh-pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --clean

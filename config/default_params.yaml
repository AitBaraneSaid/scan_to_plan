preprocessing:
  voxel_size: 0.005
  sor_k_neighbors: 20
  sor_std_ratio: 2.0
floor_ceiling:
  ransac_distance: 0.02
  ransac_iterations: 1000
  normal_tolerance_deg: 10
slicing:
  heights:
  - 2.1
  - 1.1
  - 0.2
  thickness: 0.1
density_map:
  resolution: 0.005
morphology:
  kernel_size: 3
  close_iterations: 1
  open_iterations: 0
hough:
  rho: 1
  theta_deg: 0.5
  threshold: 10
  min_line_length: 20
  max_line_gap: 10
segment_fusion:
  angle_tolerance_deg: 3.0
  perpendicular_dist: 0.05
  max_gap: 0.1
regularization:
  snap_tolerance_deg: 5.0
  alignment_tolerance: 0.02
topology:
  intersection_distance: 0.10
  min_segment_length: 0.05
wall_pairing:
  enabled: true
  angle_tolerance_deg: 3.0
  min_distance: 0.04
  max_distance: 0.30
  min_overlap_abs: 0.10
  min_overlap_ratio: 0.20
  corridor_margin: 0.02
  typical_wall_thickness: 0.15
  min_segment_length: 0.10
  corridor_intersection_threshold: 0.05
dxf:
  version: R2013
  layers:
    walls: MURS
    partitions: CLOISONS
    doors: PORTES
    windows: FENETRES
    uncertain: INCERTAIN
